name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          
      - name: Debug
        run: |
          node --version
          npm --version
          npm config list
          env | grep npm || echo "no npm env vars"
          
      - name: Disable corepack
        run: corepack disable
        
      - run: npm ci --verbose 2>&1 | head -100

      - run: npx ng build --base-href /

      - name: Add 404.html for SPA routing
        run: cp dist/eav-site/browser/index.html dist/eav-site/browser/404.html

      - name: Add .nojekyll
        run: touch dist/eav-site/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/eav-site/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
